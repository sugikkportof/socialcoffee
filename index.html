<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Singaraja Social Coffee — Premium coffee shop & event space di Singaraja, Bali." />
  <title>Singaraja Social Coffee — Premium Coffee & Event Space</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#FDF5E6',
            'cream-dark': '#F5E6C8',
            coffee: { 400: '#A0714A', 500: '#7A4F35', 600: '#5C3520', 700: '#3E2723', 800: '#2C1A17', 900: '#1A0F0D' },
            gold: { 300: '#FFD700', 500: '#B89A00' }
          },
          fontFamily: { playfair: ['"Playfair Display"', 'serif'], inter: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>

  <style>
    /* BASE & RESET */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background-color: #FDF5E6; color: #3E2723; font-family: 'Inter', sans-serif; overflow-x: hidden; }

    /* NAVBAR */
    #navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; transition: all 0.4s ease; }
    #navbar.scrolled { background: rgba(253, 245, 230, 0.9); backdrop-filter: blur(15px); box-shadow: 0 4px 24px rgba(62, 39, 35, 0.06); }
    
    .nav-link { 
      font-weight: 500; 
      font-size: 0.85rem; 
      letter-spacing: 0.05em; 
      text-transform: uppercase; 
      transition: color 0.3s ease; 
      position: relative; /* Penting untuk posisi garis */
      padding-bottom: 0.25rem; 
    }
    
    /* Ini kode sakti pembuat garis emasnya */
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: 0; 
      left: 0;
      width: 0; 
      height: 2px;
      background: linear-gradient(90deg, #B89A00, #FFD700);
      transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
